 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MontCode™ Rescue Monitor</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .emergency-active { animation: emergency-flash 1.5s infinite; }
        @keyframes emergency-flash {
            0% { background-color: #000; }
            50% { background-color: #450a0a; }
            100% { background-color: #000; }
        }
    </style>
</head>
<body id="main-body" class="bg-black text-white min-h-screen flex flex-col items-center justify-center p-6 font-sans transition-all duration-500">

    <div id="pairing-screen" class="fixed inset-0 z-[60] bg-zinc-950 flex flex-col items-center justify-center p-6 text-center">
        <img src="logo.png.jpg" class="w-16 mb-6 opacity-50">
        <h2 class="text-white font-black text-xl mb-2 italic">VINCULAR MONITOR</h2>
        <p class="text-zinc-500 text-xs mb-8 uppercase tracking-widest">Ingrese el ID que aparece en el app del paciente</p>
        
        <input type="text" id="id-input" placeholder="EJ: MC-X82J" 
               class="bg-zinc-900 border-2 border-zinc-800 text-[#ccff00] text-center text-2xl font-mono p-4 rounded-2xl w-full max-w-xs mb-6 focus:border-[#ccff00] outline-none transition-all uppercase">
        
        <button onclick="pairDevice()" class="bg-[#ccff00] text-black font-black px-12 py-4 rounded-full shadow-xl active:scale-95 transition-all">
            CONECTAR AHORA
        </button>
    </div>

    <div id="audio-lock" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/95">
        <button onclick="unlockAudio()" class="bg-[#ccff00] text-black font-black py-6 px-10 rounded-full text-xl shadow-[0_0_30px_rgba(204,255,0,0.4)] active:scale-95 transition-all">
            ACTIVATE MONITOR AUDIO
        </button>
    </div>

    <div class="flex flex-col items-center mb-12">
        <div class="w-20 h-20 mb-4 bg-zinc-900 rounded-full flex items-center justify-center border-2 border-zinc-800 shadow-xl overflow-hidden">
            <img src="logo.png.jpg" alt="MontCode Logo" class="w-full h-full object-cover">
        </div>
        <h1 class="text-zinc-500 text-[10px] font-black uppercase tracking-[0.4em]">Rescue Monitor v5.8</h1>
        <p id="linked-status" class="text-[#ccff00]/50 text-[9px] font-mono mt-2 uppercase italic tracking-widest"></p>
    </div>

    <div id="status-waiting" class="text-center">
        <div class="inline-block w-12 h-12 border-4 border-zinc-800 border-t-[#ccff00] rounded-full animate-spin mb-4"></div>
        <p class="text-zinc-700 font-bold uppercase text-[10px] tracking-widest">Monitoring Signal...</p>
    </div>

    <div id="alert-display" class="hidden w-full max-w-2xl bg-red-600 p-8 md:p-16 rounded-[50px] shadow-[0_0_80px_rgba(220,38,38,0.5)] text-center">
        <p class="text-red-200 font-black uppercase tracking-[0.2em] text-xs mb-6">⚠️ EMERGENCY SIGNAL</p>
        <h2 id="patient-name" class="text-white font-black text-4xl md:text-6xl mb-8 italic tracking-tighter uppercase leading-none">--</h2>
        
        <div class="bg-black/20 p-6 rounded-3xl border border-white/10 mb-8">
            <p id="emergency-msg" class="text-white font-bold text-2xl md:text-3xl italic uppercase leading-tight">--</p>
        </div>

        <a id="gps-link" target="_blank" class="hidden w-full bg-white text-black font-black py-4 rounded-2xl mb-4 flex items-center justify-center gap-2 transition-transform active:scale-95">
            📍 VIEW LOCATION ON MAP
        </a>

        <button onclick="window.location.reload()" class="text-red-200 text-[10px] font-bold uppercase tracking-widest border border-red-400/30 px-6 py-2 rounded-full hover:bg-red-700">Clear Alert</button>
    </div>

    <button onclick="unpairDevice()" class="fixed bottom-6 text-zinc-800 hover:text-zinc-500 text-[9px] font-black uppercase tracking-widest transition-colors">
        Reset Connection / Unpair Device
    </button>

    <script>
        let isAudioUnlocked = false;
        let savedID = localStorage.getItem('paired_id');

        // --- LÓGICA DE EMPAREJAMIENTO ---
        if (savedID) {
            document.getElementById('pairing-screen').classList.add('hidden');
            document.getElementById('audio-lock').classList.remove('hidden');
            document.getElementById('linked-status').innerText = "LINKED TO ID: " + savedID;
            initPusher(savedID);
        }

        function pairDevice() {
            const inputVal = document.getElementById('id-input').value.trim().toUpperCase();
            if (inputVal) {
                localStorage.setItem('paired_id', inputVal);
                location.reload();
            }
        }

        function unpairDevice() {
            if(confirm("¿Desea desvincular este monitor y conectar uno nuevo?")) {
                localStorage.removeItem('paired_id');
                location.reload();
            }
        }

        function unlockAudio() {
            isAudioUnlocked = true;
            document.getElementById('audio-lock').classList.add('hidden');
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            gain.gain.value = 0.01;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // --- CONEXIÓN A PUSHER ---
        function initPusher(channelID) {
            const pusher = new Pusher('284fc98940a4b6d4c359', { cluster: 'us2' });
            const channel = pusher.subscribe('rescue-' + channelID);

            channel.bind('new-reading', function(data) {
                document.getElementById('status-waiting').classList.add('hidden');
                document.getElementById('main-body').classList.add('emergency-active');
                document.getElementById('alert-display').classList.remove('hidden');
                
                document.getElementById('patient-name').innerText = data.patient;
                document.getElementById('emergency-msg').innerText = data.provider;

                // Manejo de GPS (Corregido el link de Google Maps)
                if (data.location && data.location !== "No GPS Data") {
                    const gpsBtn = document.getElementById('gps-link');
                    gpsBtn.href = `https://www.google.com/maps?q=${data.location}`;
                    gpsBtn.classList.remove('hidden');
                }

                if (isAudioUnlocked) playEmergencyVoice(data);
            });
        }

        function playEmergencyVoice(data) {
            const isSpanish = data.provider.includes("AYUDA") || data.provider.includes("LLAME");
            const utterance = new SpeechSynthesisUtterance();
            utterance.text = isSpanish 
                ? `Alerta de Mont Code. ${data.patient} necesita ayuda. ${data.provider}` 
                : `Mont Code Alert. Emergency signal from ${data.patient}. ${data.provider}`;

            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => 
                (isSpanish ? v.lang.includes('es') : v.lang.includes('en')) && 
                (v.name.includes('Google') || v.name.includes('Premium'))
            );

            if (preferredVoice) utterance.voice = preferredVoice;
            utterance.lang = isSpanish ? 'es-US' : 'en-US';
            utterance.rate = 0.85;
            window.speechSynthesis.speak(utterance);
        }

        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    </script>
</body>
</html>
