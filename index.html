 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rescue Monitor</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-10 text-center">
    <h1 class="text-red-600 text-4xl font-black mb-10">RESCUE MONITOR</h1>
    <div id="status" class="text-2xl animate-pulse text-zinc-700">Esperando señal...</div>
    <div id="alert" class="hidden bg-red-600 p-10 rounded-[40px] mt-10">
        <h2 class="text-5xl font-black" id="p-name"></h2>
    </div>
    <script>
        const pusher = new Pusher('284fc98940a4b6d4c359', { cluster: 'us2' });
        const channel = pusher.subscribe('montcode-rescue');
        channel.bind('new-reading', function(data) {
            document.getElementById('status').classList.add('hidden');
            document.getElementById('alert').classList.remove('hidden');
            document.getElementById('p-name').innerText = "ALERT: " + data.patient;
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("Rescue signal received"));
        });
    </script>
</body>
</html>
